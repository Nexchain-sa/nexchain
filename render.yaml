# render.yaml — نشر تلقائي على Render.com بضغطة واحدة
# ارفع هذا الملف في جذر المشروع على GitHub
# ثم اربط الـ repo بـ Render وسيتم النشر تلقائياً

services:
  # ── Backend API ──────────────────────────────────
  - type: web
    name: FLOWRIZ-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: FLOWRIZ-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://FLOWRIZ.netlify.app  # غيّر لرابطك الفعلي
    healthCheckPath: /health
    autoDeploy: true

# ── PostgreSQL Database ───────────────────────────
databases:
  - name: FLOWRIZ-db
    databaseName: FLOWRIZ_db
    user: FLOWRIZ_user
    plan: free
