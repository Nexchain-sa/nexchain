# render.yaml — نشر تلقائي على Render.com بضغطة واحدة
# ارفع هذا الملف في جذر المشروع على GitHub
# ثم اربط الـ repo بـ Render وسيتم النشر تلقائياً

services:
  # ── Backend API ──────────────────────────────────
  - type: web
    name: FLOWRIZ-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false   # يُضبط يدويًا في لوحة Render = رابط اتصال Neon الدائم
      - key: FRONTEND_URL
        value: https://zesty-belekoy-ef3240.netlify.app  # رابط Netlify الفعلي
    healthCheckPath: /health
    autoDeploy: true

# قاعدة البيانات خارجية (Neon) — تُضبط عبر متغير DATABASE_URL في لوحة Render
